<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>

  <style>
    :root {
      color-scheme: light;
      --green: #0f7a3b;
      --green-dark: #07502b;
      --gold: #f6c343;
      --ink: #152033;
      --muted: #607068;
      --bg: #eef8f1;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(246,195,67,.18), transparent 28%),
        linear-gradient(135deg, #f7fff9 0%, #e8f7ed 42%, #d9f0e2 100%);
    }

    main {
      width: min(520px, 100%);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 12px;
      padding: 30px;
      background: rgba(255,255,255,.86);
      box-shadow: 0 18px 44px rgba(15, 42, 26, .12);
      text-align: center;
    }

    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(145deg, var(--green), var(--green-dark));
      box-shadow: 0 12px 26px rgba(15,122,59,.24);
      font-size: 34px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      margin-top: 22px;
      padding: 10px 18px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      text-decoration: none;
      font-weight: 800;
    }

    a:hover { background: var(--green-dark); }
  </style>
</head>
<body>
  <main>
    <div class="mark">K</div>
    <h1>Membuka Aplikasi Capkin 2026</h1>
    <p>Jika halaman tidak berpindah otomatis, klik tombol berikut.</p>
    <a href="https://script.google.com/macros/s/AKfycbz6ePJuwZYaFZSkCDe_B_3CM59ogMELoJCed8oFX73WiPyoPq6DiVSl1sTNexgx1AAhPA/exec">Buka Aplikasi</a>
  </main>
</body>
</html>
