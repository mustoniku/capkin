<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Capkin Pendidikan Madrasah 2026</title>
  <link rel="icon" type="image/png" href="/logo-kemenag.png?v=4">
  <link rel="apple-touch-icon" href="/logo-kemenag.png?v=4">
  <style>
    :root {
      --green: #0f7a3b;
      --green-dark: #07502b;
      --gold: #f6c343;
      --ink: #142033;
      --muted: #66736d;
      --line: #d9e5dd;
      --logo-url: url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Seal_of_the_Ministry_of_Religious_Affairs_of_the_Republic_of_Indonesia.svg/250px-Seal_of_the_Ministry_of_Religious_Affairs_of_the_Republic_of_Indonesia.svg.png");
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 6%, rgba(246,195,67,.22), transparent 24%),
        radial-gradient(circle at 90% 12%, rgba(15,122,59,.24), transparent 30%),
        linear-gradient(135deg, #f8fff9 0%, #e1f4e8 28%, #c8e8d3 62%, #edf9f0 100%);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(460px, 100%);
      border: 1px solid rgba(255,255,255,.76);
      border-radius: 14px;
      padding: 26px;
      text-align: center;
      background: rgba(255,255,255,.88);
      box-shadow: 0 24px 68px rgba(15,42,26,.16);
    }

    .logo {
      width: 78px;
      height: 78px;
      margin: 0 auto 14px;
      border-radius: 16px;
      background: #fff var(--logo-url) center / 78% no-repeat;
      box-shadow: 0 12px 28px rgba(0,0,0,.12);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .spinner {
      width: 28px;
      height: 28px;
      margin: 18px auto 0;
      border-radius: 50%;
      border: 3px solid rgba(15,122,59,.18);
      border-top-color: var(--green);
      animation: spin .75s linear infinite;
    }

    .warning {
      margin-top: 16px;
      border-radius: 10px;
      padding: 12px;
      color: #8a5b00;
      background: #fff0c2;
      font-weight: 800;
      font-size: 14px;
    }

    iframe {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="card">
      <div class="logo" aria-hidden="true"></div>
      <h1>Capkin Pendidikan Madrasah 2026</h1>
      <p>Memuat aplikasi resmi Kementerian Agama Kabupaten Tegal.</p>
      <div class="spinner" aria-hidden="true"></div>
      <div id="warning" class="warning" hidden>
        URL Apps Script belum diisi. Ganti GANTI_DENGAN_URL_WEB_APP_EXEC dengan URL Web App yang berakhiran /exec.
      </div>
    </div>
  </div>

  <iframe id="appFrame" title="Capkin Pendidikan Madrasah 2026" hidden></iframe>

  <script>
    const TARGET_URL = 'https://script.google.com/macros/s/AKfycbznKmm0T6cRc0MdyQWC6ooQSDOEyVB7V1Qt36UICwcXuxFoqeg9jCrs-RjjaYwXk-xx/exec';

    function isValidTarget(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec(?:[?#].*)?$/.test(url);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const frame = document.getElementById('appFrame');
      const warning = document.getElementById('warning');
      if (!isValidTarget(TARGET_URL)) {
        warning.hidden = false;
        return;
      }
      frame.src = TARGET_URL;
      frame.hidden = false;
    });
  </script>
</body>
</html>
